<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XV’s Renatta 🌺</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css?v=4">
</head>

<body>

<div id="pantallaInicio">
  <div class="inicio-card">
    <h1>🌺 XV’s Renatta 🌺</h1>
    <p>Estás invitado a una experiencia especial</p>
    <button id="abrirInvitacion">💌 Abrir invitación</button>
  </div>
</div>

<div class="flores"></div>

<div class="overlay">

<section class="card hidden">
<h1 class="titulo">🌺 Aloha 🌺</h1>
<p>💌 Invitación personal e intransferible</p>
<h2>Renatta</h2>

<div class="info">
<span class="fecha">📅 20 Junio</span>
<span class="hora">⏰ 5:00pm - 10:00pm</span>
</div>

<p id="contador" class="contador"></p>
<h3 id="pases" class="pases"></h3>

<button id="toggleMusica" class="btn">🎵 Pausar música</button>
</section>

<section class="card hidden">
<h2>🌸 Dress Code</h2>
<img src="dresscode.png" class="imagen">
</section>

<section class="card hidden">
<h2>💌 Sobre</h2>
<img src="sobre.png" class="imagen">
</section>

<section class="card hidden">
<h2>📍 Ubicación</h2>
<a id="ubicacion" class="btn">Ver ubicación</a>
</section>

<section class="card hidden">
<h2>📲 Confirmar</h2>
<a id="whatsapp" class="btn">Confirmar</a>
</section>

</div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<script src="script.js?v=4"></script>
</body>
</html>
